<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindStack Distortion · Redesigned</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0c0c0c;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow-x: hidden;
  }

  /* 页面主体内容区 */
  .page-body {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 32px 40px;
    color: #888;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-align: center;
    gap: 12px;
  }
  .page-body span { color: #333; }

  /* ====== 原版 trae.cn 底部 Distortion 布局 ====== */
  .container_distortion {
    --distortion-aspect: 3.83228;
    --padding-y: 20px;
    z-index: 0;
    padding-bottom: calc((min(100vw, 1600px) + 2 * var(--padding-y)) / var(--distortion-aspect));
    position: relative;
  }

  .container_distortion .content {
    width: 100%;
    padding-block: var(--padding-y);
    height: calc((min(100vw, 1600px) + 2 * var(--padding-y)) / var(--distortion-aspect));
    padding-inline: 20px;
    position: fixed;
    bottom: 0;
    left: 0;
    overflow: hidden;
  }

  @media (width >= 744px) {
    .container_distortion .content { padding-inline: 28px; }
  }
  @media (width >= 1280px) {
    .container_distortion .content { padding-inline: 40px; }
  }

  .distortion-wrap {
    margin: 0 auto;
    width: 100%;
    max-width: 1600px;
    height: 100%;
    position: relative;
  }

  #distortionCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div class="page-body">
  <span>↓ 向下滚动查看底部效果</span>
  <div>MindStack · Grid Distortion Redesigned</div>
</div>

<div class="container_distortion">
  <div class="content">
    <div class="distortion-wrap" id="container">
      <canvas id="distortionCanvas"></canvas>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const container = document.getElementById('container');

const GRID = 15;
const MOUSE = 0.25;
const STRENGTH = 0.12;
const RELAXATION = 0.91;
const DISTORTION_ASPECT = 3.83228;

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(0, 0, 0, 0, -1000, 1000);
camera.position.z = 2;

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('distortionCanvas'),
  antialias: true,
  alpha: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// ====== 重新设计的纹理 ======
function createTextTexture() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  // 高分辨率纹理，保持宽高比
  const texH = 600;
  const texW = Math.round(texH * DISTORTION_ASPECT);
  canvas.width = texW;
  canvas.height = texH;

  // ── 背景：深色底 + 微妙纹理感 ──
  // 主底色改为近黑深色，摆脱廉价绿色
  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, texW, texH);

  // 顶部极细横线装饰（设计语言）
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let y = 0; y < texH; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(texW, y);
    ctx.stroke();
  }

  // ── 左侧文案区：Tagline + 副标题 ──
  const leftPad = texW * 0.038;
  const centerY = texH / 2;

  // 上方 label / eyebrow（极小字）
  ctx.font = `400 ${texH * 0.042}px Inter, -apple-system, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  ctx.letterSpacing = `${texH * 0.006}px`;
  ctx.fillText('YOUR PERSONAL', leftPad, centerY - texH * 0.24);

  // 主标题大字：Mind（白色）Stack（高亮品牌色）
  // 动态计算字号让文字填满约60%宽度
  let fontSize = texH * 0.52;
  ctx.font = `800 ${fontSize}px Inter, -apple-system, Arial Black, sans-serif`;
  const fullW = ctx.measureText('MindStack').width;
  const targetW = texW * 0.58;
  fontSize = fontSize * (targetW / fullW);

  ctx.font = `800 ${fontSize}px Inter, -apple-system, Arial Black, sans-serif`;
  ctx.letterSpacing = `-${fontSize * 0.01}px`;

  const wMind = ctx.measureText('Mind').width;

  const titleY = centerY + fontSize * 0.22;

  // "Mind" — 纯白
  ctx.fillStyle = '#ffffff';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('Mind', leftPad, titleY);

  // "Stack" — 品牌绿（保留 trae 风格但更精致）
  ctx.fillStyle = '#2af080';
  ctx.fillText('Stack', leftPad + wMind, titleY);

  // 副标题（主标题下方）
  ctx.letterSpacing = '0px';
  const subSize = texH * 0.058;
  ctx.font = `300 ${subSize}px Inter, -apple-system, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.40)';
  ctx.fillText('Deep learning · Time series · AI Research', leftPad, titleY + subSize * 1.55);

  // ── 右侧装饰区：终端 log 风格 ──
  const termX = texW * 0.658;   // 终端块左边起点
  const termY = texH * 0.10;   // 顶部起点
  const termW = texW * 0.335;  // 宽度
  const termH = texH * 0.82;   // 高度

  // 终端背景（极深色，略区别于页面底色）
  ctx.fillStyle = 'rgba(10,14,10,0.85)';
  ctx.beginPath();
  ctx.roundRect(termX, termY, termW, termH, 6);
  ctx.fill();

  // 终端边框
  ctx.strokeStyle = 'rgba(42,240,128,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(termX, termY, termW, termH, 6);
  ctx.stroke();

  // 顶部标题栏
  ctx.fillStyle = 'rgba(42,240,128,0.07)';
  ctx.beginPath();
  ctx.roundRect(termX, termY, termW, texH * 0.09, [6, 6, 0, 0]);
  ctx.fill();

  // 标题栏分隔线
  ctx.strokeStyle = 'rgba(42,240,128,0.10)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(termX, termY + texH * 0.09);
  ctx.lineTo(termX + termW, termY + texH * 0.09);
  ctx.stroke();

  // 三个圆点（macOS 风格）
  const dotY = termY + texH * 0.045;
  const dotColors = ['rgba(255,95,86,0.6)', 'rgba(255,189,46,0.6)', 'rgba(39,201,63,0.6)'];
  dotColors.forEach((c, i) => {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(termX + texH * 0.038 + i * texH * 0.046, dotY, texH * 0.014, 0, Math.PI * 2);
    ctx.fill();
  });

  // 标题栏文字
  ctx.font = `400 ${texH * 0.038}px 'Courier New', monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '0px';
  ctx.fillText('train.py — GRDIformer', termX + termW / 2, dotY + texH * 0.016);

  // ── log 内容 ──
  const monoSize = texH * 0.041;
  ctx.font = `400 ${monoSize}px 'Courier New', monospace`;
  ctx.textAlign = 'left';
  const lx = termX + texH * 0.032;   // 行左边距
  const lineH = monoSize * 1.72;     // 行高
  let ly = termY + texH * 0.09 + lineH; // 第一行 y

  // 颜色预设
  const C = {
    dim:    'rgba(255,255,255,0.20)',
    muted:  'rgba(255,255,255,0.38)',
    white:  'rgba(255,255,255,0.72)',
    green:  '#2af080',
    cyan:   '#38d9f5',
    yellow: '#f0c040',
    red:    '#f06060',
    purple: '#c080f0',
  };

  // 辅助：画一行，支持片段染色
  function logLine(segments) {
    let cx = lx;
    for (const [text, color] of segments) {
      ctx.fillStyle = color;
      ctx.fillText(text, cx, ly);
      cx += ctx.measureText(text).width;
    }
    ly += lineH;
  }

  logLine([['$ ', C.green], ['python train.py --model GRDIformer', C.white]]);
  logLine([['  --dataset Electricity --epochs 30', C.muted]]);
  ly += lineH * 0.3;

  logLine([['[INFO]', C.cyan], [' Loading dataset...', C.muted]]);
  logLine([['  train: 18880  val: 2632  test: 5260', C.dim]]);
  ly += lineH * 0.3;

  logLine([['[INFO]', C.cyan], [' Model params: ', C.muted], ['2.31M', C.yellow]]);
  logLine([['  MS-STD  RCM  PVA  → RevIN + GLU', C.dim]]);
  ly += lineH * 0.3;

  logLine([['Epoch ', C.muted], ['01', C.white], ['/30', C.dim]]);
  logLine([['  loss: ', C.dim], ['0.4821', C.yellow], ['  lr: 1e-4', C.dim]]);

  logLine([['Epoch ', C.muted], ['10', C.white], ['/30', C.dim]]);
  logLine([['  loss: ', C.dim], ['0.3104', C.yellow], ['  MAE↓ MSE↓', C.green]]);

  logLine([['Epoch ', C.muted], ['20', C.white], ['/30', C.dim]]);
  logLine([['  loss: ', C.dim], ['0.2287', C.yellow], ['  ✓ best ckpt', C.green]]);

  logLine([['Epoch ', C.muted], ['30', C.white], ['/30', C.dim]]);
  logLine([['  loss: ', C.dim], ['0.2193', C.yellow], ['  ✓ best ckpt', C.green]]);
  ly += lineH * 0.3;

  logLine([['[EVAL]', C.purple], [' horizon=96', C.muted]]);
  logLine([['  MAE  ', C.dim], ['0.1847', C.green], ['  MSE  ', C.dim], ['0.1342', C.green]]);
  logLine([['  DM-test p=', C.dim], ['0.0031', C.green], [' < 0.01 ✓', C.green]]);
  ly += lineH * 0.3;

  logLine([['[DONE]', C.green], [' Training complete ✓', C.white]]);

  // 光标闪烁块
  ctx.fillStyle = C.green;
  ctx.fillRect(lx, ly + monoSize * 0.08, monoSize * 0.55, monoSize * 0.85);

  // 右上角小标签（移到分隔线之上）
  ctx.font = `400 ${texH * 0.036}px 'Courier New', monospace`;
  ctx.fillStyle = 'rgba(42,240,128,0.0)'; // 已用标题栏代替，隐藏
  ctx.textAlign = 'right';

  // 分隔线已由终端块左边框承担，无需额外绘制

  // ── 顶部品牌标识（极小，左上角）──
  ctx.font = `500 ${texH * 0.038}px Inter, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.textAlign = 'left';
  ctx.letterSpacing = `${texH * 0.005}px`;
  ctx.fillText('MINDSTACK', leftPad, texH * 0.12);

  // ── 左下角 CTA 小文字 ──
  const ctaY = texH * 0.88;
  // 绿色小圆点
  ctx.fillStyle = '#2af080';
  ctx.beginPath();
  ctx.arc(leftPad + texH * 0.014, ctaY - texH * 0.012, texH * 0.012, 0, Math.PI * 2);
  ctx.fill();

  ctx.font = `400 ${texH * 0.038}px Inter, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.textAlign = 'left';
  ctx.letterSpacing = '0px';
  ctx.fillText('Hover to explore distortion effect', leftPad + texH * 0.04, ctaY);

  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  return texture;
}

const textTexture = createTextTexture();

// ====== DataTexture ======
const dataSize = GRID * GRID;
const data = new Float32Array(4 * dataSize);
// 初始位移设为0，避免入场时抖动感
for (let i = 0; i < dataSize; i++) {
  data[4 * i] = 0;
  data[4 * i + 1] = 0;
}

const dataTexture = new THREE.DataTexture(data, GRID, GRID, THREE.RGBAFormat, THREE.FloatType);
dataTexture.needsUpdate = true;

// ====== Shader ======
const uniforms = {
  time: { value: 0 },
  resolution: { value: new THREE.Vector4() },
  uTexture: { value: textTexture },
  uDataTexture: { value: dataTexture }
};

const material = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  uniforms,
  vertexShader: `
    uniform float time;
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D uDataTexture;
    uniform sampler2D uTexture;
    uniform vec4 resolution;
    varying vec2 vUv;
    void main() {
      vec2 uv = vUv;
      vec4 offset = texture2D(uDataTexture, vUv);
      gl_FragColor = texture2D(uTexture, uv - 0.02 * offset.rg);
    }
  `
});

const geometry = new THREE.PlaneGeometry(1, 1, GRID - 1, GRID - 1);
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// ====== Resize ======
function resize() {
  const w = container.offsetWidth;
  const h = container.offsetHeight;
  const aspect = w / h;
  renderer.setSize(w, h);
  mesh.scale.set(aspect, 1, 1);
  camera.left = -aspect / 2;
  camera.right = aspect / 2;
  camera.top = 0.5;
  camera.bottom = -0.5;
  camera.updateProjectionMatrix();
  uniforms.resolution.value.set(w, h, 1, 1);
}

// ====== 鼠标 ======
const mouseState = { x: 0.5, y: 0.5, prevX: 0.5, prevY: 0.5, vX: 0, vY: 0 };

function onMouseMove(e) {
  const rect = container.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = 1 - (e.clientY - rect.top) / rect.height;
  mouseState.vX = x - mouseState.prevX;
  mouseState.vY = y - mouseState.prevY;
  mouseState.x = x;
  mouseState.y = y;
  mouseState.prevX = x;
  mouseState.prevY = y;
}

function onMouseLeave() {
  mouseState.vX = 0;
  mouseState.vY = 0;
}

container.addEventListener('mousemove', onMouseMove);
container.addEventListener('mouseleave', onMouseLeave);
window.addEventListener('resize', resize);

// ====== 动画 ======
function animate() {
  requestAnimationFrame(animate);
  uniforms.time.value += 0.05;

  const arr = dataTexture.image.data;

  for (let i = 0; i < dataSize; i++) {
    arr[4 * i] *= RELAXATION;
    arr[4 * i + 1] *= RELAXATION;
  }

  const mx = GRID * mouseState.x;
  const my = GRID * mouseState.y;
  const radius = GRID * MOUSE;

  for (let m = 0; m < GRID; m++) {
    for (let v = 0; v < GRID; v++) {
      const dist2 = Math.pow(mx - m, 2) + Math.pow(my - v, 2);
      if (dist2 < radius * radius) {
        const idx = 4 * (m + GRID * v);
        const falloff = Math.min(radius / Math.sqrt(dist2), 10);
        arr[idx] += 100 * STRENGTH * mouseState.vX * falloff;
        arr[idx + 1] -= 100 * STRENGTH * mouseState.vY * falloff;
      }
    }
  }

  dataTexture.needsUpdate = true;
  renderer.render(scene, camera);
}

resize();
animate();
</script>
</body>
</html>
